name: GitGuard AI CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ── Backend Checks ──────────────────────────────────────────
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run Tests
        env:
          GITHUB_WEBHOOK_SECRET: 'test-secret-at-least-16-chars'
          MONGODB_URI: 'mongodb://localhost:27017/gitguard-test'
          JWT_SECRET: 'test-jwt-secret-at-least-32-chars-long'
          GITHUB_CLIENT_ID: 'fake'
          GITHUB_CLIENT_SECRET: 'fake'
          GITHUB_CALLBACK_URL: 'http://localhost:3001/api/auth/callback'
        run: npm test

      - name: Build
        run: npm run build

  # ── Frontend Checks ─────────────────────────────────────────
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
